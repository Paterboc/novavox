<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <h1>NovaVox</h1>
  </div>

  <div class="tab-bar">
    <button class="tab active" data-tab="subs">Subtitles</button>
    <button class="tab" data-tab="downloads">Downloads</button>
  </div>

  <!-- ── Subtitles Tab ── -->
  <div id="tab-subs" class="tab-content">

    <div id="no-tracks" class="status">
      <p>Navigate to a Netflix or YouTube video to detect subtitles.</p>
    </div>

    <div id="track-picker" class="hidden">
      <div class="toggle-row">
        <label class="toggle-label" for="dual-subs-toggle">Dual subtitles</label>
        <input type="checkbox" id="dual-subs-toggle" class="toggle-check">
      </div>

      <label class="setting-label" for="secondary-lang">Secondary language</label>
      <select id="secondary-lang">
      </select>

      <label class="setting-label">Font size</label>
      <div class="size-buttons">
        <button class="size-btn" data-size="small">S</button>
        <button class="size-btn" data-size="medium">M</button>
        <button class="size-btn" data-size="large">L</button>
      </div>

    </div>

    <div id="status-bar" class="hidden">
      <span id="status-text"></span>
    </div>

    <!-- Translate controls — always visible regardless of detected tracks -->
    <div class="toggle-row">
      <label class="toggle-label" for="hover-translate">Right-click translate</label>
      <input type="checkbox" id="hover-translate" class="toggle-check" checked>
    </div>

    <label class="setting-label" for="translate-target">Translate to</label>
    <select id="translate-target">
      <option value="en">English</option>
      <option value="es">Spanish</option>
      <option value="fr">French</option>
      <option value="de">German</option>
      <option value="it">Italian</option>
      <option value="pt">Portuguese</option>
      <option value="nl">Dutch</option>
      <option value="ru">Russian</option>
      <option value="ja">Japanese</option>
      <option value="ko">Korean</option>
      <option value="zh-CN">Chinese (Simplified)</option>
      <option value="zh-TW">Chinese (Traditional)</option>
      <option value="ar">Arabic</option>
      <option value="hi">Hindi</option>
      <option value="tr">Turkish</option>
      <option value="pl">Polish</option>
      <option value="sv">Swedish</option>
      <option value="da">Danish</option>
      <option value="no">Norwegian</option>
      <option value="fi">Finnish</option>
      <option value="th">Thai</option>
      <option value="vi">Vietnamese</option>
      <option value="id">Indonesian</option>
      <option value="uk">Ukrainian</option>
      <option value="cs">Czech</option>
      <option value="ro">Romanian</option>
      <option value="hu">Hungarian</option>
      <option value="el">Greek</option>
      <option value="he">Hebrew</option>
      <option value="bn">Bengali</option>
      <option value="ta">Tamil</option>
      <option value="tl">Filipino</option>
    </select>
  </div>

  <!-- ── Downloads Tab ── -->
  <div id="tab-downloads" class="tab-content hidden">
    <div id="no-media" class="no-media-msg">
      Navigate to a video to detect downloadable media.
    </div>
    <div id="media-list"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
